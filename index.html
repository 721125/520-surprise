<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臭胖胖的520惊喜</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="pixel-world" aria-hidden="true">
    <div class="moon"></div>
    <div class="stars"></div>
    <div class="shooting-stars">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="cloud cloud-one"></div>
    <div class="cloud cloud-two"></div>
    <div class="fireflies">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="tree tree-left">
      <span class="trunk"></span>
      <span class="leaf leaf-a"></span>
      <span class="leaf leaf-b"></span>
      <span class="leaf leaf-c"></span>
      <span class="leaf leaf-d"></span>
    </div>
    <div class="tree tree-right">
      <span class="trunk"></span>
      <span class="leaf leaf-a"></span>
      <span class="leaf leaf-b"></span>
      <span class="leaf leaf-c"></span>
      <span class="leaf leaf-d"></span>
    </div>
    <div class="petals">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="ground"></div>
  </div>
  <canvas id="fireworks" aria-hidden="true"></canvas>
  <button class="sound-toggle" id="soundToggle" type="button" aria-label="切换声音">♪</button>

  <main class="game-shell">
    <section class="stage" aria-labelledby="title">
      <p class="level">LEVEL 520</p>
      <h1 id="title">臭胖胖，520快乐</h1>

      <button class="start-button" id="startButton" type="button">
        <span class="button-icon">▶</span>
        开始惊喜
      </button>

      <div class="power-bar" aria-label="惊喜能量">
        <span id="powerFill"></span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
